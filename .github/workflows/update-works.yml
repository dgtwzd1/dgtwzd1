name: Update Works List

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  update-works:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repo
        uses: actions/checkout@v4

      - name: Generate works list
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: dgtwzd1
        run: python scripts/update_works.py

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "Works list already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update generated works list"
          git push
